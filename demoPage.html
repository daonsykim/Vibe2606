<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Page</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: min(700px, 90%);
      background: rgba(255, 255, 255, 0.92);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }

    header {
      padding: 32px 36px;
      background: #001f3f;
      color: #fff;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 2.8rem);
    }

    main {
      padding: 32px 36px;
    }

    .card {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      margin-top: 24px;
    }

    .panel {
      background: #f8fbff;
      border: 1px solid #dde9ff;
      border-radius: 18px;
      padding: 20px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .panel:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 35px rgba(0, 0, 0, 0.08);
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      background: #005bea;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    button:hover {
      background: #0047c9;
      transform: translateY(-2px);
    }

    .output {
      margin-top: 18px;
      font-size: 1rem;
      color: #333;
      min-height: 1.4rem;
    }

    .footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid #e4ecff;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 0.95rem;
      color: #555;
    }

    .badge {
      padding: 6px 12px;
      background: #e8f3ff;
      border-radius: 999px;
      color: #004b99;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container" role="main">
    <header>
      <h1>간단한 HTML CSS JavaScript 데모</h1>
      <p>버튼 클릭으로 메시지를 업데이트하는 인터랙티브 예제입니다.</p>
    </header>
    <main>
      <div class="card">
        <section class="panel">
          <h2>현재 시간 표시</h2>
          <p>버튼을 누르면 화면에 현재 시간이 표시됩니다.</p>
          <button id="timeButton">시간 보기</button>
          <div id="timeOutput" class="output"></div>
        </section>

        <section class="panel">
          <h2>랜덤 색상 변경</h2>
          <p>페이지 배경색을 무작위 색상으로 바꿉니다.</p>
          <button id="colorButton">배경색 변경</button>
          <div id="colorOutput" class="output"></div>
        </section>

        <section class="panel">
          <h2>인사 메시지</h2>
          <p>입력값에 따른 맞춤 인사말을 표시합니다.</p>
          <input id="nameInput" type="text" placeholder="이름을 입력하세요" style="width:100%; padding:12px 14px; border-radius: 12px; border:1px solid #cbd6f0;" />
          <button id="greetButton" style="margin-top: 10px;">인사하기</button>
          <div id="greetOutput" class="output"></div>
        </section>
      </div>

      <div class="footer">
        <span class="badge">HTML</span>
        <span class="badge">CSS3</span>
        <span class="badge">JavaScript</span>
      </div>
    </main>
  </div>

  <script>
    const timeButton = document.getElementById('timeButton');
    const colorButton = document.getElementById('colorButton');
    const greetButton = document.getElementById('greetButton');
    const timeOutput = document.getElementById('timeOutput');
    const colorOutput = document.getElementById('colorOutput');
    const greetOutput = document.getElementById('greetOutput');
    const nameInput = document.getElementById('nameInput');

    function formatTime(date) {
      return date.toLocaleTimeString('ko-KR', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    function randomColor() {
      const hue = Math.floor(Math.random() * 360);
      return `hsl(${hue}, 80%, 70%)`;
    }

    timeButton.addEventListener('click', () => {
      const now = new Date();
      timeOutput.textContent = `현재 시간: ${formatTime(now)}`;
    });

    colorButton.addEventListener('click', () => {
      const nextColor = randomColor();
      document.body.style.background = nextColor;
      colorOutput.textContent = `새 배경색: ${nextColor}`;
    });

    greetButton.addEventListener('click', () => {
      const name = nameInput.value.trim();
      greetOutput.textContent = name ? `${name}님, 안녕하세요!` : '이름을 입력해 주세요.';
    });
  </script>
</body>
</html>
