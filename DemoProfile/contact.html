<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연락하기 | 김서윤</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="sub-header sub-header-alt">
        <div class="container">
            <a class="back-link" href="index.html">← 메인으로 돌아가기</a>
            <h1>연락하기</h1>
            <p>AX팀 UX 디자인, 스타트업형 실행 협업을 환영합니다.</p>
        </div>
    </header>

    <main class="container">
        <section class="section contact-card">
            <h2>연락 정보</h2>
            <p>롯데칠성 AX팀</p>
            <p>이메일: <a href="mailto:seoyun.kim@lottechesung.com">seoyun.kim@lottechesung.com</a></p>
            <p>전화: 010-1234-5678</p>
            <p>가능 분야: 디지털 AX, 롯데칠성 브랜드 캠페인, 크리에이티브 협업</p>
        </section>

        <section class="section form-section">
            <h2>간단한 메시지 보내기</h2>
            <form id="contactForm">
                <label for="name">이름</label>
                <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required>

                <label for="email">이메일</label>
                <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" required>

                <label for="message">메시지</label>
                <textarea id="message" name="message" rows="5" placeholder="어떤 협업을 원하시는지 알려주세요" required></textarea>

                <button type="submit" class="btn">보내기</button>
            </form>
            <p id="formResult" class="form-result"></p>
        </section>
    </main>

    <footer class="footer">
    <p>롯데칠성 AX팀 김서윤의 공식 연락 페이지</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
